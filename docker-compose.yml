services:

  # ══════════════════════════════════════════════════════════
  # HDFS — NameNode
  # ══════════════════════════════════════════════════════════
  namenode:
    image: apache/hadoop:3.4.3
    container_name: namenode
    user: "root"
    command: ["bash", "/opt/cluster/start-namenode.sh"]
    environment:
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - ./docker/hadoop/config:/opt/hadoop/etc/hadoop:ro
      - ./docker/hadoop/scripts:/opt/cluster:ro
      - hdfs_namenode:/hadoop/dfs/name
    healthcheck:
      test: ["CMD-SHELL", "hdfs dfsadmin -report > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  # ══════════════════════════════════════════════════════════
  # HDFS — DataNodes
  # ══════════════════════════════════════════════════════════
  datanode1:
    image: apache/hadoop:3.4.3
    container_name: datanode1
    user: "root"
    command: ["bash", "/opt/cluster/start-datanode.sh"]
    environment:
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    volumes:
      - ./docker/hadoop/config:/opt/hadoop/etc/hadoop:ro
      - ./docker/hadoop/scripts:/opt/cluster:ro
      - hdfs_datanode_1:/hadoop/dfs/data
    depends_on:
      - namenode

  datanode2:
    image: apache/hadoop:3.4.3
    container_name: datanode2
    user: "root"
    command: ["bash", "/opt/cluster/start-datanode.sh"]
    environment:
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    volumes:
      - ./docker/hadoop/config:/opt/hadoop/etc/hadoop:ro
      - ./docker/hadoop/scripts:/opt/cluster:ro
      - hdfs_datanode_2:/hadoop/dfs/data
    depends_on:
      - namenode

  # ══════════════════════════════════════════════════════════
  # YARN — ResourceManager
  # ══════════════════════════════════════════════════════════
  resourcemanager:
    image: apache/hadoop:3.4.3
    container_name: resourcemanager
    user: "root"
    command: ["bash", "/opt/cluster/start-resourcemanager.sh"]
    environment:
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    ports:
      - "8088:8088"
    volumes:
      - ./docker/hadoop/config:/opt/hadoop/etc/hadoop:ro
      - ./docker/hadoop/scripts:/opt/cluster:ro
    depends_on:
      namenode:
        condition: service_healthy
      datanode1:
        condition: service_started
      datanode2:
        condition: service_started

  nodemanager1:
    image: apache/hadoop:3.4.3
    container_name: nodemanager1
    user: "root"
    command: ["bash", "/opt/cluster/start-nodemanager.sh"]
    environment:
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    volumes:
      - ./docker/hadoop/config:/opt/hadoop/etc/hadoop:ro
      - ./docker/hadoop/scripts:/opt/cluster:ro
    depends_on:
      namenode:
        condition: service_healthy
      resourcemanager:
        condition: service_started

  nodemanager2:
    image: apache/hadoop:3.4.3
    container_name: nodemanager2
    user: "root"
    command: ["bash", "/opt/cluster/start-nodemanager.sh"]
    environment:
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    volumes:
      - ./docker/hadoop/config:/opt/hadoop/etc/hadoop:ro
      - ./docker/hadoop/scripts:/opt/cluster:ro
    depends_on:
      namenode:
        condition: service_healthy
      resourcemanager:
        condition: service_started

  historyserver:
    image: apache/hadoop:3.4.3
    container_name: historyserver
    user: "root"
    command: ["bash", "/opt/cluster/start-historyserver.sh"]
    environment:
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    ports:
      - "19888:19888"
    volumes:
      - ./docker/hadoop/config:/opt/hadoop/etc/hadoop:ro
      - ./docker/hadoop/scripts:/opt/cluster:ro
    depends_on:
      namenode:
        condition: service_healthy
      resourcemanager:
        condition: service_started

  # ══════════════════════════════════════════════════════════
  # Hadoop Streaming job (runs once, exits 0 on success)
  # ══════════════════════════════════════════════════════════
  jobsubmitter:
    build:
      context: .
      dockerfile: backend/Dockerfile.hadoop-job
    container_name: jobsubmitter
    restart: "no"
    environment:
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      HADOOP_INPUT_CSV: /app/data/creditcard.csv
      HADOOP_OUTPUT_DIR: /app/hadoop-output
      HADOOP_HDFS_INPUT_DIR: /fraud/input
      HADOOP_HDFS_OUTPUT_DIR: /fraud/output
    volumes:
      - ./backend/data:/app/data
      - ./backend/src:/app/src
      - ./backend/hadoop-output:/app/hadoop-output
      - ./docker/hadoop/config:/opt/hadoop/etc/hadoop:ro
    depends_on:
      namenode:
        condition: service_healthy
      resourcemanager:
        condition: service_started
      nodemanager1:
        condition: service_started
      nodemanager2:
        condition: service_started

  # ══════════════════════════════════════════════════════════
  # Apache Kafka (KRaft mode — no ZooKeeper needed)
  # ══════════════════════════════════════════════════════════
  kafka:
    image: apache/kafka:4.0.2
    container_name: kafka
    ports:
      - "29092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:19092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      # ✅ MUST use port 19092 (PLAINTEXT listener, advertises kafka:19092).
      # Port 9092 is PLAINTEXT_HOST and advertises localhost:29092 — that port
      # is NOT bound inside the container, so kafka-topics.sh hangs forever.
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:19092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 15s
      retries: 30
      start_period: 60s

  # ══════════════════════════════════════════════════════════
  # Kafka topic initialiser (runs once, then exits)
  # ══════════════════════════════════════════════════════════
  kafka-init:
    image: apache/kafka:4.0.2
    container_name: kafka-init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command:
      - "kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:19092 --topic fraud-transactions --partitions 3 --replication-factor 1 && echo '[kafka-init] Topic fraud-transactions is ready.'"

  # ══════════════════════════════════════════════════════════
  # Transaction generator — continuously publishes to Kafka
  # ══════════════════════════════════════════════════════════
  generator:
    build:
      context: ./backend
    container_name: generator
    command: ["python", "-m", "src.docker_tx_generator"]
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_STREAM_TOPIC: fraud-transactions
      TX_GENERATOR_INTERVAL: "0.5"
      # 8 % fraud rate for visible demo. Real Kaggle rate is 0.001727 (0.17 %).
      TX_GENERATOR_FRAUD_RATE: "0.3"
    depends_on:
      # ✅ Only wait for the container to start, not for kafka to be healthy.
      # docker_tx_generator.py already retries every 5 s until the broker is ready,
      # and KAFKA_AUTO_CREATE_TOPICS_ENABLE=true handles topic creation automatically.
      kafka:
        condition: service_started

  # ══════════════════════════════════════════════════════════
  # FastAPI ML backend
  # ══════════════════════════════════════════════════════════
  backend:
    build:
      context: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_STREAM_TOPIC: fraud-transactions
      KAFKA_STREAM_MAX_MESSAGES: "50"
      KAFKA_STREAM_IDLE_SECONDS: "8"
    volumes:
      - ./backend/data:/app/data
      - ./backend/models:/app/models
    depends_on:
      # ✅ Only wait for the container to start, not for kafka to be healthy.
      # app.py falls back to mock streaming if Kafka isn't ready yet,
      # and _try_stream_from_kafka() handles Kafka becoming available mid-session.
      kafka:
        condition: service_started

  # ══════════════════════════════════════════════════════════
  # React dashboard (nginx)
  # ══════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  hdfs_namenode:
  hdfs_datanode_1:
  hdfs_datanode_2:
